services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_hedge_fund}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic_hedge_fund}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/agentic_hedge_fund}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      SIMULATION_RECORDINGS_DIR: ${SIMULATION_RECORDINGS_DIR:-/app/recordings/simulations}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - simulation-recordings:/app/recordings
    command: >
      sh -c "python -m app.scripts.wait_for_db &&
             alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  simulation-recordings:
