  <title id="title">Agentic Hedge Fund full-system architecture</title>
  <desc id="desc">Zoomable architecture map linking Alibaba Cloud Docker runtime, React dashboard panels, FastAPI APIs, simulation core, Qwen agent society, tool gateway, MCP, governance, execution, order book fills, long-short ledger accounting, replay, and benchmark proof.</desc>
