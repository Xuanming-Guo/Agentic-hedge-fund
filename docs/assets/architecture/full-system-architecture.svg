  <text class="text" x="90" y="1490">How to read this:</text>
  <text class="small" x="90" y="1520">The dashboard sends REST controls and receives WebSocket/replay snapshots. Qwen agents produce structured JSON and tool calls, but deterministic services enforce risk, compliance, broker routing, order-book matching, fills, long/short accounting, replay persistence, and benchmark proof.</text>
  <text class="small" x="90" y="1548">Irrefutable Alibaba deployment proof still requires runtime ECS artifacts: console/video, docker compose ps, deployed /health, deployed /api/proof/qwen, and dashboard screenshots.</text>
